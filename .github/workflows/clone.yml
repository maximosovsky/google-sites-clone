name: Clone Site
on:
  workflow_dispatch:
    inputs:
      url:
        description: Google Sites URL to clone
        required: true
        type: string
      email:
        description: Email for notification (optional)
        required: false
        type: string
      webhook_url:
        description: Webhook URL for upload notification
        required: false
        type: string
      webhook_secret:
        description: Webhook secret for auth
        required: false
        type: string
      gh_token:
        description: User GitHub token for Pages deploy
        required: false
        type: string
      gh_user:
        description: GitHub username for Pages deploy
        required: false
        type: string

jobs:
  clone:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install SingleFile CLI
        run: npm install -g single-file-cli

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run pipeline
        run: |
          node bin/gsclone.js "${{ github.event.inputs.url }}" -o ./clone-output
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Create ZIP
        run: |
          cd clone-output/site
          zip -r ../../clone-result.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clone-result
          path: clone-result.zip
          retention-days: 7

      - name: Send to webhook
        if: github.event.inputs.webhook_url != ''
        run: |
          ZIP_B64=$(base64 -w 0 clone-result.zip)
          REPORT_HTML=""
          if [ -f clone-output/site/report.html ]; then
            REPORT_HTML=$(cat clone-output/site/report.html)
          fi
          jq -n \
            --arg email "${{ github.event.inputs.email }}" \
            --arg siteUrl "${{ github.event.inputs.url }}" \
            --arg zip "$ZIP_B64" \
            --arg report "$REPORT_HTML" \
            '{email: $email, siteUrl: $siteUrl, zip: $zip, report: $report}' | \
          curl -s -X POST "${{ github.event.inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ github.event.inputs.webhook_secret }}" \
            -d @-
          echo "Webhook sent"
