name: Clone Site
on:
  workflow_dispatch:
    inputs:
      url:
        description: Google Sites URL to clone
        required: true
        type: string
      email:
        description: Email for notification (optional)
        required: false
        type: string
      webhook_url:
        description: Webhook URL for upload notification
        required: false
        type: string
      webhook_secret:
        description: Webhook secret for auth
        required: false
        type: string
      gh_token:
        description: User GitHub token for Pages deploy
        required: false
        type: string
      gh_user:
        description: GitHub username for Pages deploy
        required: false
        type: string

jobs:
  clone:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install SingleFile CLI
        run: npm install -g single-file-cli

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run pipeline
        run: |
          node bin/gsclone.js "${{ github.event.inputs.url }}" -o ./clone-output
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Create ZIP
        run: |
          cd clone-output/site
          zip -r ../../clone-result.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clone-result
          path: clone-result.zip
          retention-days: 7

      - name: Generate file ID
        id: fileid
        run: echo "id=$(openssl rand -hex 8)" >> "$GITHUB_OUTPUT"

      - name: Upload to R2
        if: github.event.inputs.webhook_url != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          ID="${{ steps.fileid.outputs.id }}"

          # Upload ZIP (supports up to 1GB+ via multipart)
          aws s3 cp clone-result.zip \
            "s3://${{ secrets.R2_BUCKET }}/zips/${ID}.zip" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/zip"

          # Upload report if exists
          if [ -f clone-output/site/report.html ]; then
            aws s3 cp clone-output/site/report.html \
              "s3://${{ secrets.R2_BUCKET }}/reports/${ID}.html" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "text/html"
          fi

          echo "Files uploaded: zips/${ID}.zip, reports/${ID}.html"

      - name: Send webhook notification
        if: github.event.inputs.webhook_url != ''
        run: |
          ID="${{ steps.fileid.outputs.id }}"
          REPORT_EXISTS="false"
          if [ -f clone-output/site/report.html ]; then
            REPORT_EXISTS="true"
          fi

          curl -s -X POST "${{ github.event.inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ github.event.inputs.webhook_secret }}" \
            -d "{\"id\":\"${ID}\",\"email\":\"${{ github.event.inputs.email }}\",\"siteUrl\":\"${{ github.event.inputs.url }}\",\"hasReport\":${REPORT_EXISTS}}"

          echo "Webhook sent with id=${ID}"
